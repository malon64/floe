name: Dagster Floe (Python)

on:
  pull_request:
    paths:
      - "orchestrators/dagster-floe/**"
      - ".github/workflows/dagster-floe.yml"
  push:
    branches: ["main"]
    paths:
      - "orchestrators/dagster-floe/**"
      - ".github/workflows/dagster-floe.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            orchestrators/dagster-floe/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "orchestrators/dagster-floe[dev]"
      - name: Tests
        run: |
          python -m pytest -q orchestrators/dagster-floe/tests
