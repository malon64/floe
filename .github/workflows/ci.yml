name: CI

on:
  pull_request:

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-rust
          add-job-id-key: false
          shared-key: v0-rust-feature
          cache-on-failure: true
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-rust
          add-job-id-key: false
          shared-key: v0-rust-feature
          cache-on-failure: true
      # Lint the lean default capability set (parquet + delta + iceberg). The
      # duckdb sink pulls a bundled native build; linting it on every PR would
      # reintroduce the slow compile this gating removed, so duckdb clippy lives
      # in the dedicated, path-gated `duckdb` job below. `--no-default-features
      # --features delta,iceberg` keeps floe-cli/floe-python (whose defaults
      # include duckdb) from dragging in the bundle here.
      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets --no-default-features --features delta,iceberg -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            floe_core:
              - "crates/floe-core/**"
            core_code:
              - "crates/floe-core/src/**"
              - "crates/floe-core/Cargo.toml"
            core_code_global:
              - "crates/floe-core/src/**"
              - "!crates/floe-core/src/io/**"
              - "!crates/floe-core/src/report/**"
              - "!crates/floe-core/src/run/**"
              - "!crates/floe-core/src/manifest/**"
              - "!crates/floe-core/src/config/**"
              - "!crates/floe-core/src/checks/**"
              - "crates/floe-core/Cargo.toml"
            manifest:
              - "crates/floe-core/src/manifest/**"
              - "crates/floe-core/tests/unit/manifest/**"
            unit_tests:
              - "crates/floe-core/tests/unit/**"
              - "crates/floe-core/tests/unit.rs"
            integration_tests:
              - "crates/floe-core/tests/integration/**"
              - "crates/floe-core/tests/integration.rs"
            floe_cli:
              - "crates/floe-cli/**"
            core_io:
              - "crates/floe-core/src/io/**"
              - "crates/floe-core/tests/unit/io/**"
            core_run:
              - "crates/floe-core/src/run/**"
              - "crates/floe-core/tests/unit/run/**"
            io_format:
              - "crates/floe-core/src/io/format.rs"
              - "crates/floe-core/tests/unit/io/format.rs"
            io_read:
              - "crates/floe-core/src/io/read/**"
              - "crates/floe-core/tests/unit/io/read/**"
            io_storage:
              - "crates/floe-core/src/io/storage/**"
              - "crates/floe-core/tests/unit/io/storage/**"
            io_write:
              - "crates/floe-core/src/io/write/**"
              - "crates/floe-core/tests/unit/io/write/**"
            run_entity:
              - "crates/floe-core/src/run/entity/**"
              - "crates/floe-core/tests/unit/run/entity/**"
            run_checks:
              - "crates/floe-core/src/checks/**"
              - "crates/floe-core/tests/unit/run/checks.rs"
            run_schema:
              - "crates/floe-core/src/checks/mismatch.rs"
              - "crates/floe-core/src/run/schema_mismatch.rs"
              - "crates/floe-core/tests/unit/run/schema_mismatch.rs"
            run_report:
              - "crates/floe-core/src/report/**"
              - "crates/floe-core/tests/unit/report/**"
              - "crates/floe-core/tests/unit/run/report.rs"
            run_check_order:
              - "crates/floe-core/src/run/entity/**"
              - "crates/floe-core/src/run/file.rs"
              - "crates/floe-core/tests/unit/run/check_order.rs"
            run_normalize:
              - "crates/floe-core/src/run/normalize.rs"
              - "crates/floe-core/tests/unit/run/normalize.rs"
            core_config:
              - "crates/floe-core/src/config/**"
              - "crates/floe-core/tests/unit/config/**"
            docs:
              - "docs/**"
              - "README.md"
            floe_python:
              - "crates/floe-python/**"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-rust
          add-job-id-key: false
          shared-key: v0-rust-feature
          cache-on-failure: true
      - name: Run tests
        env:
          CARGO_BUILD_JOBS: "4"
          RUST_TEST_THREADS: "4"
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          if [ "${{ steps.changes.outputs.floe_core }}" = "true" ]; then
            ran_unit=0
            if [ "${{ steps.changes.outputs.core_config }}" = "true" ]; then
              cargo test -p floe-core --test unit config::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.manifest }}" = "true" ]; then
              cargo test -p floe-core --test unit manifest::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.io_format }}" = "true" ]; then
              cargo test -p floe-core --test unit io::format::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.io_read }}" = "true" ]; then
              cargo test -p floe-core --test unit io::read::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.io_storage }}" = "true" ]; then
              cargo test -p floe-core --test unit io::storage::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.io_write }}" = "true" ]; then
              cargo test -p floe-core --test unit io::write::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_entity }}" = "true" ]; then
              cargo test -p floe-core --test unit run::entity::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_checks }}" = "true" ]; then
              cargo test -p floe-core --test unit run::checks::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_schema }}" = "true" ]; then
              cargo test -p floe-core --test unit run::schema_mismatch::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_report }}" = "true" ]; then
              cargo test -p floe-core --test unit run::report::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_check_order }}" = "true" ]; then
              cargo test -p floe-core --test unit run::check_order::
              ran_unit=1
            fi
            if [ "${{ steps.changes.outputs.run_normalize }}" = "true" ]; then
              cargo test -p floe-core --test unit run::normalize::
              ran_unit=1
            fi
            if [ "$ran_unit" = "0" ] && [ "${{ steps.changes.outputs.core_code_global }}" = "true" ]; then
              cargo test -p floe-core --test unit
              ran_unit=1
            fi
            if [ "$ran_unit" = "0" ] && [ "${{ steps.changes.outputs.unit_tests }}" = "true" ]; then
              cargo test -p floe-core --test unit
            fi
            if [ "${{ steps.changes.outputs.integration_tests }}" = "true" ] \
              || [ "${{ steps.changes.outputs.core_code }}" = "true" ]; then
              cargo test -p floe-core --test integration -- --test-threads=1
            fi
            cargo test -p floe-core --doc
          fi
          if [ "${{ steps.changes.outputs.floe_cli }}" = "true" ]; then
            cargo test -p floe-cli --tests
          fi
      - uses: actions/setup-python@v6
        if: steps.changes.outputs.floe_python == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Create virtualenv and install deps
        if: steps.changes.outputs.floe_python == 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install "maturin>=1.7,<2" pytest mypy
      - name: Build and install floe-python
        if: steps.changes.outputs.floe_python == 'true'
        run: .venv/bin/maturin develop --manifest-path crates/floe-python/Cargo.toml
      - name: Run Python tests
        if: steps.changes.outputs.floe_python == 'true'
        run: .venv/bin/pytest crates/floe-python/tests/ -v
      - name: Type-check stubs
        if: steps.changes.outputs.floe_python == 'true'
        run: .venv/bin/mypy crates/floe-python/tests/test_floe.py --ignore-missing-imports

  # The DuckDB sink is the only one with a bundled native (C++) build, which is
  # why it is opt-in (`--features duckdb`) and excluded from the default `test`
  # and `clippy` jobs above. This job compiles that bundle only when DuckDB code
  # changes, on its own rust-cache key so the heavy artifact is cached
  # independently and never evicts (or is evicted by) the lean default build.
  duckdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            io_write_duckdb:
              - "crates/floe-core/src/io/write/duckdb.rs"
              - "crates/floe-core/src/io/write/duckdb/**"
              - "crates/floe-core/tests/integration/duckdb_run.rs"
              - "crates/floe-core/tests/unit/config/duckdb_validation.rs"
              - "crates/floe-core/Cargo.toml"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.io_write_duckdb == 'true'
        with:
          components: clippy
      # ubuntu-latest ships build-essential (gcc/g++/make), which is all the
      # bundled libduckdb-sys build needs — no extra toolchain install required.
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.io_write_duckdb == 'true'
        with:
          prefix-key: v0-rust
          add-job-id-key: false
          shared-key: v0-rust-duckdb
          cache-on-failure: true
      - name: Lint duckdb sink with clippy
        if: steps.changes.outputs.io_write_duckdb == 'true'
        run: cargo clippy -p floe-core --all-targets --features duckdb -- -D warnings
      - name: Run duckdb sink tests
        if: steps.changes.outputs.io_write_duckdb == 'true'
        env:
          CARGO_BUILD_JOBS: "4"
          RUST_TEST_THREADS: "4"
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          cargo test -p floe-core --features duckdb --lib io::write::duckdb
          cargo test -p floe-core --features duckdb --test unit config::duckdb_validation::
          cargo test -p floe-core --features duckdb --test integration duckdb_run:: -- --test-threads=1
