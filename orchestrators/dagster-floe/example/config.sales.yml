version: "0.2"
metadata:
  project: "floe-dagster-example-sales"

domains:
  - name: "sales"
    incoming_dir: "./in/sales"

report:
  path: "./report"

entities:
  - name: "orders"
    domain: "sales"
    source:
      format: "csv"
      path: "./in/sales/orders.csv"
      options:
        header: true
        separator: ","
    sink:
      accepted:
        format: "parquet"
        path: "./out/accepted/orders"
      rejected:
        format: "csv"
        path: "./out/rejected/orders"
    policy:
      severity: "reject"
    schema:
      columns:
        - name: "order_id"
          type: "string"
          nullable: false
          unique: true
        - name: "created_at"
          type: "datetime"
          nullable: false
        - name: "amount"
          type: "number"
          nullable: false

  - name: "invoices"
    domain: "sales"
    source:
      format: "csv"
      path: "./in/sales/invoices.csv"
      options:
        header: true
        separator: ","
    sink:
      accepted:
        format: "parquet"
        path: "./out/accepted/invoices"
      rejected:
        format: "csv"
        path: "./out/rejected/invoices"
    policy:
      severity: "reject"
    schema:
      columns:
        - name: "invoice_id"
          type: "string"
          nullable: false
          unique: true
        - name: "order_id"
          type: "string"
          nullable: false
        - name: "paid"
          type: "boolean"
          nullable: false
