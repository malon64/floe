name: Release floe-python (PyPI)

on:
  push:
    tags:
      - "floe-python-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # OIDC for PyPI trusted publisher

jobs:
  build:
    name: Build wheels (${{ matrix.target }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-13
            target: x86_64
            manylinux: "off"
          - os: macos-latest
            target: aarch64
            manylinux: "off"
          - os: windows-latest
            target: x86_64
            manylinux: "off"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release
            -m crates/floe-python/Cargo.toml
            --out dist
            --features vendored-openssl
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m crates/floe-python/Cargo.toml --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@v6
        with:
          path: dist
          name: sdist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
