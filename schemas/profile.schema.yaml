$schema: https://yaml-schema.net/yaml-config.schema.yaml
$id: https://floe.local/schema/profile-v1

title: Floe Environment Profile v1

description: >
  Machine-readable schema for Floe Environment Profile files (kind: EnvironmentProfile).
  Place one profile per environment (e.g. profiles/dev.yml, profiles/prod.yml).
  Profile variables feed into the {{VAR}} placeholder substitution in Floe config files.

type: object
additionalProperties: false
required:
  - apiVersion
  - kind
  - metadata

properties:
  apiVersion:
    type: string
    const: floe/v1
    description: >
      Schema version discriminator. Must be exactly "floe/v1".

  kind:
    type: string
    const: EnvironmentProfile
    description: >
      Document kind discriminator. Must be exactly "EnvironmentProfile".

  metadata:
    $ref: "#/$defs/profile_metadata"

  execution:
    $ref: "#/$defs/profile_execution"

  variables:
    $ref: "#/$defs/variables"

  catalogs:
    $ref: "#/$defs/catalogs"

  validation:
    $ref: "#/$defs/profile_validation"

$defs:
  profile_metadata:
    type: object
    additionalProperties: false
    required:
      - name
    description: Identifying information for this profile.
    properties:
      name:
        type: string
        minLength: 1
        description: >
          Short identifier for this profile (e.g. "dev", "uat", "prod").
          Must be a non-empty string.
      description:
        type: string
        description: Human-readable description of this environment profile.
      env:
        type: string
        description: >
          Free-form environment label (e.g. "dev", "staging", "production").
          Used for documentation and observability; not validated by the engine.
      tags:
        type: array
        items:
          type: string
        description: Optional list of string tags for grouping or filtering profiles.

  profile_execution:
    type: object
    additionalProperties: false
    required:
      - runner
    description: Execution settings for this environment.
    properties:
      runner:
        $ref: "#/$defs/profile_runner"
      orchestration:
        $ref: "#/$defs/profile_orchestration"

  profile_orchestration:
    type: object
    additionalProperties: false
    description: >
      Controls how Floe schedules entity runs within a single execution.
      Both fields are optional; omit the block entirely to use the default
      (unbounded parallel) behaviour.
    properties:
      strategy:
        type: string
        enum:
          - sequential
          - parallel
        description: >
          Execution order of entities.
            - "sequential": entities run one after another in sorted order.
            - "parallel": entities run concurrently (default when omitted).
      max_concurrent_entities:
        type: integer
        minimum: 1
        description: >
          Maximum number of entities that may run at the same time.
          Must be >= 1.  When combined with strategy "sequential" this
          value is effectively 1.

  profile_runner:
    type: object
    additionalProperties: false
    required:
      - type
    description: Runner configuration. Determines where Floe executes.
    properties:
      type:
        type: string
        enum:
          - local
          - kubernetes_job
          - databricks_job
        description: >
          Runner kind.
            - "local": execute directly on the current machine (default).
            - "kubernetes_job": delegate execution to a Kubernetes Job (connector-side).
            - "databricks_job": delegate execution to a Databricks Job (connector-side).
      command:
        type: string
        description: Override the entrypoint command (e.g. "floe" or a wrapper script path).
      args:
        type: array
        items:
          type: string
        description: >
          Override the CLI arguments passed to the entrypoint. When absent the manifest
          execution.base_args + execution.per_entity_args are used.
      timeout_seconds:
        type: integer
        minimum: 1
        description: >
          Maximum wall-clock time (in seconds) before the runner considers the job timed out.
          Defaults to 3600 for kubernetes_job.
      ttl_seconds_after_finished:
        type: integer
        minimum: 0
        description: >
          Kubernetes: ttlSecondsAfterFinished on the Job spec — automatically cleans up
          completed Jobs after this many seconds.
      poll_interval_seconds:
        type: integer
        minimum: 1
        description: >
          Polling interval (in seconds) used by the runner while waiting for the job to
          finish. Defaults to 10 for kubernetes_job.
      # ── Kubernetes runner fields ──────────────────────────────────────────
      image:
        type: string
        minLength: 1
        description: >
          Container image for the Floe runner Pod
          (required when type = "kubernetes_job").
          Example: my-registry/floe:1.2.3
      namespace:
        type: string
        minLength: 1
        description: >
          Kubernetes namespace where the Job will be created
          (required when type = "kubernetes_job").
      service_account:
        type: string
        description: >
          Name of the Kubernetes ServiceAccount to attach to the runner Pod.
          Required when the Pod needs cloud-provider IAM or RBAC privileges.
      resources:
        type: object
        additionalProperties: false
        description: CPU and memory resource requests for the runner container.
        properties:
          cpu:
            type: string
            description: >
              CPU resource request in Kubernetes quantity notation
              (e.g. "500m", "1", "2000m").
          memory_mb:
            type: integer
            minimum: 1
            description: Memory request in mebibytes (e.g. 512 → 512Mi).
      env:
        type: object
        additionalProperties:
          type: string
        description: >
          Additional environment variables injected into the runner container as plain
          key→value pairs. Use secrets[] for values that must come from Kubernetes Secrets.
      secrets:
        type: array
        description: >
          Kubernetes Secret key references injected as environment variables into the
          runner container. Each entry maps a secret key to an env-var name.
        items:
          type: object
          additionalProperties: false
          required:
            - name
            - secret_name
            - key
          properties:
            name:
              type: string
              minLength: 1
              description: Name of the environment variable set in the container.
            secret_name:
              type: string
              minLength: 1
              description: Name of the Kubernetes Secret resource.
            key:
              type: string
              minLength: 1
              description: Key within the Kubernetes Secret.
      # ── Databricks runner fields ──────────────────────────────────────────
      workspace_url:
        type: string
        description: >
          Databricks workspace URL (required when type = "databricks_job").
          Example: https://adb-1234567890.1.azuredatabricks.net
      existing_cluster_id:
        type: string
        description: >
          ID of the Databricks all-purpose cluster to run the job on
          (required when type = "databricks_job").
      config_uri:
        type: string
        description: >
          DBFS or workspace path to the Floe config file used inside the Databricks job
          (required when type = "databricks_job").
      python_file_uri:
        type: string
        description: >
          DBFS or workspace path to the Floe Python entry-point file
          (required when type = "databricks_job").
      auth:
        type: object
        additionalProperties: false
        description: Authentication settings for the Databricks runner.
        properties:
          service_principal_oauth_ref:
            type: string
            description: >
              Reference to the OAuth credential for service-principal authentication
              (required when type = "databricks_job").
              Example: env://DATABRICKS_TOKEN

  variables:
    type: object
    additionalProperties:
      type: string
    description: >
      Flat map of string → string variables injected into the Floe config at
      runtime via {{VAR}} placeholder substitution.

      Precedence (highest wins):
        config env.vars  >  config env.file  >  profile variables

      Values may contain ${KEY} cross-references to other variables in the same
      profile (e.g. OUT_PATH: ${BASE_PATH}/accepted). These are resolved before
      config substitution, respecting the precedence chain above.

      Syntactically malformed placeholders (${ without a closing }, or ${} with
      an empty key) are rejected at profile validation time.


  catalogs:
    type: object
    additionalProperties: false
    required:
      - definitions
    description: >
      Environment-specific catalog definitions for Iceberg and Delta sinks.
      When provided with a main config, the profile catalogs block replaces the
      config-level catalogs block for that command invocation.
    properties:
      default:
        type: string
        description: Default catalog name used when entity sinks omit a catalog.
      definitions:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/catalog_definition"

  catalog_definition:
    type: object
    additionalProperties: false
    required:
      - name
      - type
    properties:
      name:
        type: string
        minLength: 1
      type:
        type: string
        enum: [glue, rest, unity]
      warehouse_storage:
        type: string
        description: Optional storage definition name used as the catalog warehouse root.
      warehouse_prefix:
        type: string
        description: Optional path prefix under the warehouse storage.
      region:
        type: string
        description: Glue catalog region; required when type is glue.
      database:
        type: string
        description: Glue database; required when type is glue.
      create_database_if_missing:
        type: boolean
      allow_takeover:
        type: boolean
      uri:
        type: string
        description: REST catalog URI; required when type is rest.
      credential:
        type: string
      warehouse:
        type: string
      oauth2_server_uri:
        type: string
      scope:
        type: string
      host:
        type: string
        description: Unity Catalog host; required when type is unity.
      catalog:
        type: string
        description: Unity Catalog name; required when type is unity.
      schema:
        type: string
        description: Unity schema name; required when type is unity.
      token:
        type: string
        description: Unity authentication token or substituted secret.
      create_schema_if_missing:
        type: boolean
    allOf:
      - if:
          properties:
            type:
              const: glue
        then:
          required: [region, database]
      - if:
          properties:
            type:
              const: rest
        then:
          required: [uri]
      - if:
          properties:
            type:
              const: unity
        then:
          required: [host, catalog, schema, token]

  profile_validation:
    type: object
    additionalProperties: false
    description: Validation behaviour overrides for this environment.
    properties:
      strict:
        type: boolean
        description: >
          When true, the engine applies strict validation rules (e.g. all
          schema columns must be present, no extra columns allowed).
          When false or absent, validation follows the default behaviour
          defined in the main Floe config.
